aid: smoobu
url: https://raw.githubusercontent.com/api-evangelist/smoobu/refs/heads/main/apis.yml
name: Smoobu
kind: company
description: Smoobu is an all-in-one vacation rental channel manager and property
  management system for short-term rental hosts and property managers. It synchronizes
  availability, rates, and reservations across Airbnb, Booking.com, Vrbo, and other
  channels, and provides a booking website, unified guest inbox, automated messaging,
  guest online check-in, invoicing, and dynamic pricing. The Smoobu REST API (base
  https://login.smoobu.com/api) lets Professional subscribers and integration partners
  read and write apartments, reservations, rates and availability, guests, and guest
  messages, and receive webhook notifications when bookings change. Authentication is
  via an API key header (with HMAC-signed requests recommended and OAuth 2 available
  for partners).
