description: >-
  FinOps view of Smoobu spend. Smoobu is a per-unit SaaS subscription for
  short-term rental hosts and property managers; the REST API and webhooks are
  included with a Professional subscription at no additional per-call cost. The
  dominant cost driver is therefore the number of rental units (apartments)
  under management, the chosen plan (Professional Pre-Paid, Professional Flex, or
  Teams Pro+), the billing term (monthly, annual, or two-year), and optional
  add-ons (extra write-access accounts, e-invoicing, dynamic pricing). The
  Professional Flex plan additionally charges a small per-booking commission.
notes: >-
  There is no separate API meter to allocate - cost tracks units and add-ons.
  Verify unit prices, commission, and add-on fees on the Smoobu pricing page;
  amounts are in EUR and vary by region and billing term.
