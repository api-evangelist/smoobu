meters:
- name: units
  description: Number of rental units (apartments) managed; the primary per-unit subscription driver.
  unit: units
  aggregation: sum
  dimensions:
  - account
  - plan
- name: bookings_commission
  description: Per-booking commission charged on the Professional Flex plan (0.9% of booking value).
  unit: bookings
  aggregation: sum
  dimensions:
  - account
  - apartment
- name: write_access_accounts
  description: Additional write-access user accounts billed per month.
  unit: accounts
  aggregation: sum
  dimensions:
  - account
- name: dynamic_pricing
  description: Smoobu Dynamic Pricing add-on billed per property per month.
  unit: properties
  aggregation: sum
  dimensions:
  - account
  - apartment
principles:
- name: Visibility
  description: Track the number of active units, add-ons, and (on Flex) booking commission per account.
- name: Allocation
  description: Map units and add-ons to properties/portfolios so subscription cost lands on the right cost center.
- name: Optimization
  description: Choose the plan and billing term (annual/two-year discounts) that best fit unit count and booking volume; drop unused write-access seats and add-ons.
- name: Accountability
  description: Assign an owner per account/portfolio to review the monthly subscription, add-ons, and any Flex commission.
