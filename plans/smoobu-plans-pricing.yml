specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Smoobu
providerId: smoobu
created: '2026-07-03'
modified: '2026-07-03'
reconciled: false
tags:
- Vacation Rental
- Channel Manager
- Property Management
- Short-Term Rental
- Plans
description: >-
  Smoobu is sold as a per-unit SaaS subscription, not as a separately metered
  API product. The API is included for Professional subscribers - there is no
  additional per-call API fee - so the plans below reflect Smoobu's product
  subscription tiers, priced by the number of rental units (apartments) managed.
  A free trial is available. Subscriptions are billed monthly by default, with a
  ~10% discount for annual and ~20% for two-year commitments. Prices are in EUR
  and were observed on the Smoobu pricing page around July 2026; verify current
  figures before relying on them.
notes: >-
  The API itself carries no separate charge; access is a function of holding a
  Professional (or Teams) subscription. Reconcile exact unit prices, commission,
  and add-on fees against the live Smoobu pricing page - figures change and vary
  by region and billing term.
sources:
- https://www.smoobu.com/en/pricing/
- https://support.smoobu.com/hc/en-us/articles/360003170680-How-much-will-Smoobu-cost-me
- https://docs.smoobu.com/
plans:
- id: smoobu-trial
  name: Free Trial
  type: free
  description: >-
    Time-limited free trial of the Professional feature set, including channel
    management and API access, before choosing a paid plan.
  entries:
  - label: Trial Period
    name: trial
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: free during trial
    userMultiplied: false
  elements:
